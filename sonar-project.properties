# =============================================================================
# SonarQube Project Configuration
# Scanner: sonar-scanner (invoked via npx in Jenkinsfile)
# Server : configured in Jenkins → Manage Jenkins → Configure System
# =============================================================================

# ─── Project Identity ─────────────────────────────────────────────────────────
# Must be unique across the SonarQube instance
sonar.projectKey=devsecops-demo

# Display name shown in the SonarQube UI
sonar.projectName=DevSecOps Demo

# Keep in sync with package.json version
sonar.projectVersion=1.0.0

# ─── Source & Test Directories ────────────────────────────────────────────────
# Relative paths from the directory containing this file
sonar.sources=.
sonar.tests=test

# ─── Exclusions ───────────────────────────────────────────────────────────────
# Exclude third-party dependencies, generated outputs, and CI/CD config files
sonar.exclusions=\
    node_modules/**,\
    reports/**,\
    .github/**,\
    coverage/**

# Exclude test directory from main source metrics
# (test code is still analysed separately under sonar.tests)
sonar.test.exclusions=test/**

# ─── Coverage ─────────────────────────────────────────────────────────────────
# Path to the LCOV report generated by: npm run test:ci
# Jest writes this file to reports/coverage/lcov.info
sonar.javascript.lcov.reportPaths=reports/coverage/lcov.info

# ─── Encoding ─────────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
